# Navsat transform, processes /gps/fix into usable cartesian coordinates
# Only runs when using GPS-based global localization (map_type:=gps)
navsat_transform_node:
  ros__parameters:
    frequency: 30.0
    delay: 1.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_utm_transform: false
    publish_filtered_gps: false
    use_odometry_yaw: true
    wait_for_datum: false


